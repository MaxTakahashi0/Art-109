<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>relax by the pond</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <iframe width="700" height="400"
            src="https://www.youtube.com/embed/Ip9i94Y4ceo?si=GiDuJIBIJu-zQHON&mute=1&amp;controls=0"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <img src="media/koi.gif" alt="kois surrounding a duck" class="koi-pond">
        <div>
            <p class="relax-div">relax by the pond, relax by the pond, relax by the pond </p>
            <img src="media/duck.gif" alt="rotating duck" class="duck">
        </div>
        <!-- regualar autoplay vid -->
        <video width="280" height="520" autoplay muted loop>
            <source src="media/pond.mp4" type="video/mp4">
        </video>
        <!-- hover vidz -->
        <video class="hover-video" width="280" height="520" muted loop>
            <source src="media/pond.mp4" type="video/mp4">
        </video>
        <video class="hover-video" width="280" height="520" muted loop>
            <source src="media/pond.mp4" type="video/mp4">
        </video>
        <!-- click on play vid -->
                 <video class="click-video" width="280" height="520" muted loop>
            <source src="media/pond.mp4" type="video/mp4">
        </video>
        <!-- webcam -->
         <video id="webcam" autoplay playsinline></video>
        
    </main>
    <script src="js/video.js"> </script>
    <script src="js/webcam.js"></script>
</body>

</html>
